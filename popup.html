<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      width: 300px;
      background: #FFFFFF;
      color: #333;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #EEEEEE;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1B3A5C;
      margin-bottom: 2px;
    }
    .header p {
      font-size: 10px;
      color: #888;
      line-height: 1.4;
    }
    .section { padding: 12px 16px; border-bottom: 1px solid #F0F0F0; }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #F5F5F5;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-text { font-size: 11px; color: #555; }
    .score-display {
      text-align: center;
      padding: 12px 0 8px;
    }
    .score-number {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .score-verdict {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .score-desc { font-size: 10px; color: #666; }
    .dim-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .dim-label { min-width: 110px; font-size: 10px; color: #666; }
    .dim-bar-track {
      flex: 1;
      height: 4px;
      background: #EEEEEE;
      border-radius: 2px;
      overflow: hidden;
    }
    .dim-bar-fill { height: 100%; border-radius: 2px; }
    .dim-score { min-width: 24px; text-align: right; font-size: 10px; font-weight: 500; }
    .flag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
      margin: 2px 2px 0 0;
    }
    .disagree-box {
      background: #FDF8EC;
      border-left: 3px solid #B8860B;
      padding: 8px 10px;
      border-radius: 0 4px 4px 0;
      margin-top: 8px;
    }
    .disagree-title { font-weight: 600; color: #854F0B; font-size: 10px; margin-bottom: 4px; }
    .disagree-item { font-size: 10px; color: #666; margin-bottom: 2px; }
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 10px;
      color: #888;
      text-decoration: none;
    }
    .footer a:hover { color: #1B3A5C; }
    .no-result {
      padding: 20px 16px;
      text-align: center;
      color: #888;
      font-size: 11px;
      line-height: 1.6;
    }
    .server-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Agora</h1>
    <p>Five AI models. One epistemic signal. Process over prestige.</p>
  </div>

  <div id="content">
    <div class="no-result">
      Loading result for this page...
    </div>
  </div>

  <div class="footer">
    <div class="server-status">
      <div id="server-dot" class="status-dot" style="background:#CCC"></div>
      <span id="server-label">Checking server...</span>
    </div>
    <a href="#" id="rescore-btn">Rescore</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
